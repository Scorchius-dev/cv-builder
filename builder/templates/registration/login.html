{% extends 'builder/index.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 p-4 mt-4 mt-md-5 auth-card">
            <h3 class="mb-1">Welcome Back</h3>
            <p class="text-muted small mb-4">
                Continue building tailored applications in minutes.
            </p>

            <form method="post" id="login-form" novalidate>
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div class="alert alert-danger py-2">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn btn-success w-100" id="login-btn">
                    Login
                </button>
            </form>

            <p class="mt-3 mb-0 text-muted small">
                New here? <a href="{% url 'signup' %}">Create an account</a>
            </p>
        </div>
    </div>
</div>
<style>
    .auth-card input {
        width: 100%;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
    }
</style>
<script>
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    if (loginForm && loginBtn) {
        loginForm.addEventListener('submit', () => {
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
        });
    }
</script>
{% endblock %}
