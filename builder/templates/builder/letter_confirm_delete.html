{% extends 'builder/index.html' %}

{% block content %}
<!-- Destructive-action confirmation for letter deletion -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow p-4 border-danger">
                <h3>Delete this letter?</h3>
                <p>Are you sure you want to delete the letter for <strong>{{ letter.job_title }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Delete Permanently</button>
                    <a href="{% url 'letter_detail' letter.pk %}" class="btn btn-outline-secondary w-100">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
