{% extends 'builder/index.html' %}

{% block content %}
<!-- Destructive-action confirmation for CV deletion -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow p-4 border-danger">
                <h3>Are you sure?</h3>
                <p>Do you really want to delete <strong>"{{ cv.title }}"</strong>? This cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mb-2">Confirm Delete</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
